<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-blue-700 text-white flex-shrink-0 hidden md:flex flex-col">
            <div class="p-6 text-2xl font-bold border-b border-blue-600">
                Flipkart Admin
            </div>
            <nav class="flex-grow p-4 space-y-2">
                <a href="#" class="block p-3 bg-blue-800 rounded-lg flex items-center"><i class="fas fa-tachometer-alt mr-3"></i> Dashboard</a>
                <a href="#" class="block p-3 hover:bg-blue-600 rounded-lg flex items-center transition"><i class="fas fa-box mr-3"></i> Products</a>
                <a href="#" class="block p-3 hover:bg-blue-600 rounded-lg flex items-center transition"><i class="fas fa-shopping-cart mr-3"></i> Orders</a>
                <a href="#" class="block p-3 hover:bg-blue-600 rounded-lg flex items-center transition"><i class="fas fa-users mr-3"></i> Customers</a>
                <a href="#" class="block p-3 hover:bg-blue-600 rounded-lg flex items-center transition"><i class="fas fa-ad mr-3"></i> Offers & Banners</a>
            </nav>
            <div class="p-4 border-t border-blue-600">
                <button class="w-full bg-red-500 hover:bg-red-600 p-2 rounded text-sm transition">Logout</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0">
                <h2 class="text-xl font-semibold text-gray-800">Product Management</h2>
                <div class="flex items-center space-x-4">
                    <span class="text-gray-600 italic text-sm">Welcome, Admin</span>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=2874f0&color=fff" class="w-10 h-10 rounded-full border">
                </div>
            </header>

            <div class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                        <p class="text-gray-500 text-sm font-medium">Total Sales</p>
                        <h3 class="text-2xl font-bold">₹12,45,000</h3>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-yellow-500">
                        <p class="text-gray-500 text-sm font-medium">Pending Orders</p>
                        <h3 class="text-2xl font-bold">48</h3>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                        <p class="text-gray-500 text-sm font-medium">Active Products</p>
                        <h3 class="text-2xl font-bold">1,240</h3>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold text-gray-800">Add New Product</h3>
                        <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">+ Add Product</button>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <input type="text" placeholder="Product Name" class="border p-2 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none">
                        <select class="border p-2 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none">
                            <option>Category</option>
                            <option>Electronics</option>
                            <option>Fashion</option>
                            <option>Home</option>
                        </select>
                        <input type="number" placeholder="Price (₹)" class="border p-2 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none">
                        <input type="number" placeholder="Stock Quantity" class="border p-2 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm overflow-hidden border">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-4 font-semibold text-gray-700">Image</th>
                                <th class="p-4 font-semibold text-gray-700">Product Name</th>
                                <th class="p-4 font-semibold text-gray-700">Category</th>
                                <th class="p-4 font-semibold text-gray-700">Price</th>
                                <th class="p-4 font-semibold text-gray-700">Stock</th>
                                <th class="p-4 font-semibold text-gray-700">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y">
                            <tr>
                                <td class="p-4"><div class="w-12 h-12 bg-gray-200 rounded"></div></td>
                                <td class="p-4 font-medium">iPhone 15 Pro</td>
                                <td class="p-4 text-gray-600">Electronics</td>
                                <td class="p-4 font-bold">₹1,29,900</td>
                                <td class="p-4"><span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs">24 in stock</span></td>
                                <td class="p-4 text-blue-600 space-x-2">
                                    <button class="hover:underline">Edit</button>
                                    <button class="text-red-500 hover:underline">Delete</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
