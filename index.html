<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOROK STORE</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<!-- HEADER -->
<header class="bg-blue-600 text-white p-4 flex justify-between">
  <h1 class="text-xl font-bold">BOROK STORE</h1>
  <button onclick="openLogin()">Admin Login</button>
</header>

<!-- PRODUCT LIST -->
<div id="product-list" class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6"></div>

<!-- WHATSAPP BUTTON -->
<a href="https://wa.me/919863653392" target="_blank" class="fixed bottom-5 right-5 bg-green-500 text-white px-4 py-3 rounded-full shadow-lg">WhatsApp</a>

<!-- ADMIN LOGIN -->
<div id="login-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center">
  <div class="bg-white p-6 rounded w-80">
    <h2 class="font-bold mb-3">Admin Login</h2>
    <input id="admin-id" placeholder="ID" class="border p-2 w-full mb-2" />
    <input id="admin-pass" type="password" placeholder="Password" class="border p-2 w-full mb-2" />
    <button onclick="login()" class="bg-blue-500 text-white px-4 py-2 w-full">Login</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" class="hidden p-6">
  <h2 class="text-lg font-bold mb-4">Admin Panel</h2>

  <input id="p-name" placeholder="Product Name" class="border p-2 mb-2 w-full" />
  <input id="p-price" placeholder="Price" class="border p-2 mb-2 w-full" />
  <input id="p-img" placeholder="Image URL (multiple comma separated)" class="border p-2 mb-2 w-full" />

  <button onclick="addProduct()" class="bg-green-500 text-white px-4 py-2">Add Product</button>

  <div id="admin-products" class="mt-6"></div>
</div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [];

const ADMIN_ID = "admin";
const ADMIN_PASS = "1234";

function renderProducts() {
  const list = document.getElementById("product-list");
  list.innerHTML = "";

  products.forEach((p, index) => {
    list.innerHTML += `
      <div class="bg-white p-4 rounded shadow">
        <img src="${p.images[0]}" class="h-40 w-full object-cover mb-2" />
        <h3 class="font-bold">${p.name}</h3>
        <p>₹${p.price}</p>
      </div>`;
  });
}

function openLogin() {
  document.getElementById("login-modal").classList.remove("hidden");
}

function login() {
  const id = document.getElementById("admin-id").value;
  const pass = document.getElementById("admin-pass").value;

  if (id === ADMIN_ID && pass === ADMIN_PASS) {
    document.getElementById("login-modal").classList.add("hidden");
    document.getElementById("admin-panel").classList.remove("hidden");
    renderAdminProducts();
  } else {
    alert("Wrong login!");
  }
}

function addProduct() {
  const name = document.getElementById("p-name").value;
  const price = document.getElementById("p-price").value;
  const images = document.getElementById("p-img").value.split(",");

  products.push({ name, price, images });
  localStorage.setItem('products', JSON.stringify(products));

  renderProducts();
  renderAdminProducts();
}

function deleteProduct(index) {
  products.splice(index, 1);
  localStorage.setItem('products', JSON.stringify(products));
  renderProducts();
  renderAdminProducts();
}

function renderAdminProducts() {
  const div = document.getElementById("admin-products");
  div.innerHTML = "";

  products.forEach((p, i) => {
    div.innerHTML += `
      <div class="bg-white p-3 mb-2 shadow flex justify-between">
        <span>${p.name} - ₹${p.price}</span>
        <button onclick="deleteProduct(${i})" class="text-red-500">Delete</button>
      </div>`;
  });
}

renderProducts();
</script>

</body>
</html>
