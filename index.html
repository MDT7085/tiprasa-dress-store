<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiprasa Traditional Dress | Rignai Risa Store</title>
<meta name="description" content="Buy authentic Tiprasa traditional dresses including Rignai, Risa, Takborok, Duti and tribal designs from Tripura.">

<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
header{background:#7a0c2e;color:white;padding:16px;text-align:center}
nav{background:#111;color:white;padding:10px;text-align:center}
nav button{margin:5px;padding:8px 12px;border:none;border-radius:5px;cursor:pointer}
.banner img{width:100%;max-height:350px;object-fit:cover}

.container{padding:20px}
.search{width:100%;padding:10px;margin-bottom:20px;border-radius:6px;border:1px solid #ccc}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}

.card{background:white;border-radius:10px;padding:15px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.card img{width:100%;height:200px;object-fit:cover;border-radius:8px;cursor:pointer}

.gallery{display:flex;gap:5px;margin-top:6px}
.gallery img{width:40px;height:40px;object-fit:cover;border-radius:4px;border:1px solid #ddd;cursor:pointer}

.price{font-weight:bold}
button{padding:8px;border:none;border-radius:6px;cursor:pointer}
.order{background:#25D366;color:white;width:100%;margin-top:6px}
.edit{background:#ff9800;color:white;margin-top:6px;width:100%}
.delete{background:#d11a2a;color:white;margin-top:6px;width:100%}

.admin{margin-top:30px;background:white;padding:20px;border-radius:10px}
input,textarea,select{padding:8px;margin:5px;width:100%}

.login{background:white;padding:20px;border-radius:10px;max-width:400px;margin:auto;margin-top:20px}
.hidden{display:none}

/* PRODUCT MODAL */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);align-items:center;justify-content:center}
.modal-content{background:white;width:90%;max-width:700px;padding:20px;border-radius:10px}
.modal img{width:100%;max-height:350px;object-fit:cover;border-radius:8px}
.review{border-top:1px solid #ddd;margin-top:8px;padding-top:6px;font-size:14px}

.qrbox{margin-top:20px;text-align:center}

</style>
</head>

<body>

<header>
<h1>Tiprasa Traditional Dress Store</h1>
<p>Authentic Tripura Tribal Clothing</p>
</header>

<div class="banner">
<img id="bannerImage" src="https://via.placeholder.com/1200x350?text=Tiprasa+Traditional+Dress">
</div>

<nav>
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('Rignai')">Rignai</button>
<button onclick="filterCategory('Risa')">Risa</button>
<button onclick="filterCategory('Takborok')">Takborok</button>
<button onclick="filterCategory('Blouse')">Blouse</button>
<button onclick="filterCategory('Duti')">Duti</button>
</nav>

<div class="container">

<input id="search" class="search" placeholder="Search products..." onkeyup="searchProduct()">

<div class="products" id="productList"></div>

<!-- ADMIN LOGIN -->
<div class="login" id="adminLogin">
<h3>Admin Login</h3>
<input id="adminUser" placeholder="Username">
<input id="adminPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div class="admin hidden" id="adminPanel">
<h3>Admin Product Manager</h3>

<h4>Change Admin Password</h4>
<input id="oldPass" type="password" placeholder="Current Password">
<input id="newPass" type="password" placeholder="New Password">
<button onclick="changePassword()">Change Password</button>
<hr>

<h4>Banner Image</h4>
<input id="bannerInput" placeholder="Banner Image URL">
<button onclick="setBanner()">Update Banner</button>

<h4>Website Share Link</h4>
<input id="siteLink" placeholder="Paste your website link here">
<button onclick="generateQR()">Generate QR Code</button>

<div class="qrbox">
<img id="qrImage" width="150">
<p>Scan to open shop</p>
</div>

<hr>

<input id="name" placeholder="Product Name">
<input id="price" type="number" placeholder="Price">
<input id="image" placeholder="Main Image URL">
<input id="gallery" placeholder="Gallery images (comma separated)">
<textarea id="description" placeholder="Product description"></textarea>
<select id="category">
<option>Rignai</option>
<option>Risa</option>
<option>Takborok</option>
<option>Blouse</option>
<option>Duti</option>
</select>
<button onclick="addProduct()">Save Product</button>
</div>

</div>

<!-- PRODUCT MODAL -->
<div class="modal" id="productModal">
<div class="modal-content">
<img id="modalImage">
<h2 id="modalName"></h2>
<p id="modalPrice"></p>
<p id="modalDesc"></p>

<div class="gallery" id="modalGallery"></div>

<h4>Customer Reviews</h4>
<div id="reviewList"></div>

<textarea id="reviewInput" placeholder="Write your review here"></textarea>
<button onclick="addReview()">Submit Review</button>

<button onclick="buyNow()" class="order">Buy Now</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

let products = JSON.parse(localStorage.getItem('products')) || [];

let currentProduct = null;
let editIndex = -1;
let isAdmin = false;

function save(){
  localStorage.setItem("products", JSON.stringify(products));
}

function display(list = products){
  let html = "";

  list.forEach((p,i)=>{

    let adminButtons = "";
    if(isAdmin){
      adminButtons = `
      <button class='edit' onclick='editProduct(${i})'>Edit</button>
      <button class='delete' onclick='deleteProduct(${i})'>Delete</button>`;
    }

    html += `
    <div class="card">
      <img src="${p.image}" onclick="openProduct(${i})">
      <h3>${p.name}</h3>
      <p class="price">₹${p.price}</p>

      <button class="order" onclick="orderProduct(${i})">Order WhatsApp</button>

      ${adminButtons}
    </div>`;
  });

  document.getElementById("productList").innerHTML = html;
}

function login(){
  let savedPass = localStorage.getItem("adminPass") || "1234";

  if(adminUser.value === 'admin' && adminPass.value === savedPass){
    adminLogin.style.display = "none";
    adminPanel.classList.remove("hidden");
    isAdmin = true;
    display();
  } else {
    alert("Wrong login");
  }
}

function changePassword(){
  let savedPass = localStorage.getItem("adminPass") || "1234";

  if(oldPass.value !== savedPass){
    alert("Current password incorrect");
    return;
  }

  if(newPass.value.length < 4){
    alert("Password must be at least 4 characters");
    return;
  }

  localStorage.setItem("adminPass", newPass.value);
  alert("Password changed successfully");

  oldPass.value = "";
  newPass.value = "";
}

function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let image = document.getElementById("image").value;
  let gallery = document.getElementById("gallery").value.split(",");
  let description = document.getElementById("description").value;
  let category = document.getElementById("category").value;

  let product = {name, price, image, gallery, description, category, reviews:[]};

  if(editIndex === -1) products.push(product);
  else {
    products[editIndex] = product;
    editIndex = -1;
  }

  save();
  display();
}

function editProduct(i){
  let p = products[i];

  document.getElementById("name").value = p.name;
  document.getElementById("price").value = p.price;
  document.getElementById("image").value = p.image;
  document.getElementById("gallery").value = (p.gallery || []).join(",");
  document.getElementById("description").value = p.description;
  document.getElementById("category").value = p.category;

  editIndex = i;
}

function deleteProduct(i){
  products.splice(i,1);
  save();
  display();
}

function openProduct(i){
  let p = products[i];
  currentProduct = i;

  modalImage.src = p.image;
  modalName.innerText = p.name;
  modalPrice.innerText = "Price: ₹" + p.price;
  modalDesc.innerText = p.description || "";

  let ghtml = "";
  if(p.gallery){
    p.gallery.forEach(img => {
      ghtml += `<img src='${img}' onclick="modalImage.src='${img}'">`;
    });
  }

  modalGallery.innerHTML = ghtml;

  let rhtml = "";
  if(p.reviews){
    p.reviews.forEach(r => {
      rhtml += `<div class='review'>⭐ ${r}</div>`;
    });
  }

  reviewList.innerHTML = rhtml;

  productModal.style.display = "flex";
}

function closeModal(){
  productModal.style.display = "none";
}

function addReview(){
  let txt = reviewInput.value;
  if(!txt) return;

  if(!products[currentProduct].reviews) products[currentProduct].reviews = [];

  products[currentProduct].reviews.push(txt);

  reviewInput.value = "";

  save();
  openProduct(currentProduct);
}

function buyNow(){
  orderProduct(currentProduct);
}

function orderProduct(i){

  let product = products[i];

  // Ask customer details
  let customerName = prompt("Enter your name:");
  if(!customerName) return;

  let customerPhone = prompt("Enter your phone number:");
  if(!customerPhone) return;

  let date = new Date().toLocaleString();

  let phone = "9863653392";

  let msg = `New Order from Website

Customer Name: ${customerName}
Customer Phone: ${customerPhone}
Product: ${product.name}
Price: ₹${product.price}
Order Time: ${date}`;

  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}
\nPrice: ₹${product.price}`;

  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

function setBanner(){
  let url = bannerInput.value;
  bannerImage.src = url;
  localStorage.setItem("banner", url);
}

function generateQR(){
  let link = siteLink.value;
  let qr = `https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=${encodeURIComponent(link)}`;
  qrImage.src = qr;
}

function searchProduct(){
  let v = search.value.toLowerCase();
  let f = products.filter(p => p.name.toLowerCase().includes(v));
  display(f);
}

function filterCategory(c){
  if(c === 'all'){ display(); return; }
  let f = products.filter(p => p.category === c);
  display(f);
}

let savedBanner = localStorage.getItem("banner");
if(savedBanner) bannerImage.src = savedBanner;

display();

</script>

<footer style="text-align:center;padding:25px;background:#111;color:white;margin-top:40px;font-size:16px">
<p>Website Design & Development by <b>MATINDRA TRIPURA</b></p>
<p style="font-size:13px;opacity:0.8">Tiprasa Traditional Dress Online Store</p>
</footer>

</body>
</html>
