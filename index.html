<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-white shadow p-4 flex justify-between">
    <h1 class="text-xl font-bold">MyShop</h1>
    <button onclick="viewCart()">Cart (<span id="cart-count">0</span>)</button>
  </nav>

  <!-- Products -->
  <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6" id="product-list"></div>

  <!-- Cart Modal -->
  <div id="cart-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-white p-6 rounded w-96">
      <h2 class="text-lg font-bold mb-4">Your Cart</h2>
      <ul id="cart-items"></ul>
      <p class="mt-4 font-bold">Total: ₹<span id="total">0</span></p>
      <button onclick="checkout()" class="mt-4 bg-green-500 text-white px-4 py-2 rounded">Checkout</button>
      <button onclick="closeCart()" class="mt-2 text-red-500">Close</button>
    </div>
  </div>

<script>
const products = [
  { id: 1, name: "T-Shirt", price: 499 },
  { id: 2, name: "Shoes", price: 1299 },
  { id: 3, name: "Watch", price: 1999 }
];

let cart = [];

function renderProducts() {
  const list = document.getElementById("product-list");
  list.innerHTML = "";
  products.forEach(p => {
    list.innerHTML += `
      <div class="bg-white p-4 rounded shadow">
        <h3 class="font-bold">${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${p.id})" class="mt-2 bg-blue-500 text-white px-3 py-1 rounded">Add to Cart</button>
      </div>`;
  });
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  cart.push(product);
  updateCart();
}

function updateCart() {
  document.getElementById("cart-count").innerText = cart.length;
}

function viewCart() {
  const modal = document.getElementById("cart-modal");
  const list = document.getElementById("cart-items");
  const total = document.getElementById("total");

  list.innerHTML = "";
  let sum = 0;

  cart.forEach(item => {
    list.innerHTML += `<li>${item.name} - ₹${item.price}</li>`;
    sum += item.price;
  });

  total.innerText = sum;
  modal.classList.remove("hidden");
}

function closeCart() {
  document.getElementById("cart-modal").classList.add("hidden");
}

function checkout() {
  alert("Order placed successfully!");
  cart = [];
  updateCart();
  closeCart();
}

renderProducts();
</script>

</body>
</html>
